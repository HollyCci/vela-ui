name: Deploy showcase to GitHub Pages

# push 到 main 自动构建 build:demo 并部署 showcase 到 GitHub Pages。
# 首次使用需在仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 部署 Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署，新 push 取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # 版本读 package.json 的 packageManager

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build showcase (base=/vela-ui/)
        run: pnpm build:demo
        env:
          VELA_PAGES_BASE: /vela-ui/

      - name: SPA fallback (404 → index for deep-link refresh)
        run: cp dist-demo/index.html dist-demo/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
