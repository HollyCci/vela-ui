<!doctype html>
<html class="light" style="--font-inter:'Inter','Inter Fallback'">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/heroui/fonts.css" />
<link rel="stylesheet" href="/heroui/full.css" />
<style>html,body{margin:0;background:var(--background)}</style>
</head>
<body><div class="text-foreground antialiased"><div class="text-foreground"><div class="flex min-h-screen p-6 sm:p-10 items-center justify-center"><div class="mx-auto flex w-full max-w-[714px] flex-col gap-8"><div class="chat-message--user" data-slot="chat-message-user"><div class="chat-message__bubble" data-slot="chat-message-bubble"><div class="chat-message__content" data-slot="chat-message-content">What is the weather in San Francisco?</div></div></div><div class="chat-message--assistant" data-slot="chat-message-assistant"><div class="chat-message__avatar" data-slot="chat-message-avatar"><span class="avatar avatar--md size-8"><span class="avatar__fallback avatar__fallback--default" data-slot="avatar-fallback">AI</span></span></div><div class="chat-message__body" data-slot="chat-message-body"><span class="text-shimmer" data-slot="text-shimmer">Thinking...</span><span aria-label="Thinking..." class="chat-loader__dots" data-slot="chat-loader-dots" role="status"><span class="chat-loader__dot"></span><span class="chat-loader__dot"></span><span class="chat-loader__dot"></span><span class="sr-only">Thinking...</span></span></div></div><div aria-busy="true" aria-label="Loading response" class="chat-loader__skeleton" data-slot="chat-loader-skeleton" role="status"><div class="chat-loader__skeleton-avatar" data-slot="chat-loader-skeleton-avatar"></div><div class="chat-loader__skeleton-block" data-slot="chat-loader-skeleton-block"><div class="chat-loader__skeleton-line" data-slot="chat-loader-skeleton-line"></div><div class="chat-loader__skeleton-line" data-slot="chat-loader-skeleton-line"></div><div class="chat-loader__skeleton-line" data-slot="chat-loader-skeleton-line"></div></div></div></div></div></div></div><next-route-announcer style="position: absolute;"></next-route-announcer></body></html>
